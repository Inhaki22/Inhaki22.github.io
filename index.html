<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tablero de Tareas</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:         #0d0d0d;
  --surface:    #161616;
  --surface2:   #1e1e1e;
  --border:     #272727;
  --border2:    #333;
  --text:       #ede8e0;
  --text2:      #a09a93;
  --muted:      #5c5650;
  --amber:      #f0a500;
  --amber-dim:  #2e2000;
  --blue:       #5b9bff;
  --blue-dim:   #0b1d40;
  --green:      #3ecf6a;
  --green-dim:  #0a2818;
  --red:        #ff5f5f;
  --radius:     12px;
  --radius-sm:  8px;
}

html, body { height: 100%; background: var(--bg); color: var(--text);
  font-family: 'DM Sans', sans-serif; font-size: 14px; }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 10px; }

/* ── APP ── */
.app { min-height: 100vh; display: flex; flex-direction: column; gap: 20px;
  padding: 24px 18px 40px; }

/* ── HEADER ── */
header { display: flex; align-items: center; justify-content: space-between;
  gap: 12px; flex-wrap: wrap; }

.logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px;
  letter-spacing: -0.4px; }
.logo span { color: var(--amber); }

.header-actions { display: flex; gap: 8px; flex-wrap: wrap; }

/* ── BUTTONS ── */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 14px; border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif;
  font-size: 13px; font-weight: 500; cursor: pointer; border: none;
  transition: opacity .15s, transform .1s, background .15s;
  white-space: nowrap;
}
.btn:hover { opacity: .82; }
.btn:active { transform: scale(.97); }
.btn-primary { background: var(--amber); color: #000; font-family: 'Syne', sans-serif; font-weight: 700; }
.btn-ghost   { background: var(--surface2); color: var(--text); border: 1px solid var(--border2); }
.btn-danger  { background: transparent; color: var(--red); border: 1px solid rgba(255,95,95,.3); }
.btn-danger:hover { background: rgba(255,95,95,.08); opacity: 1; }
.btn-sm { padding: 5px 10px; font-size: 12px; }

/* ── ADD BAR ── */
.add-bar { display: flex; gap: 8px; flex-wrap: wrap; }
.add-bar input, .add-bar select {
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text); padding: 8px 13px; border-radius: var(--radius-sm);
  font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none;
  transition: border-color .2s;
}
.add-bar input { flex: 1 1 160px; min-width: 0; }
.add-bar input::placeholder { color: var(--muted); }
.add-bar input:focus, .add-bar select:focus { border-color: var(--amber); }
.add-bar select { cursor: pointer; }

/* ── BOARD ── */
.board { display: flex; gap: 14px; align-items: flex-start; flex-wrap: wrap; flex: 1; }

/* ── COLUMN ── */
.column {
  flex: 1 1 280px; min-width: 230px; background: var(--surface);
  border: 1px solid var(--border); border-radius: 16px;
  display: flex; flex-direction: column; overflow: hidden;
  transition: border-color .2s, box-shadow .2s;
}
.column.drag-over {
  border-color: var(--amber);
  box-shadow: 0 0 0 1px var(--amber), inset 0 0 40px rgba(240,165,0,.03);
}

.col-header { padding: 14px 16px 11px; display: flex; align-items: center;
  justify-content: space-between; border-bottom: 1px solid var(--border); }

.col-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 12px;
  letter-spacing: .7px; text-transform: uppercase; display: flex; align-items: center; gap: 7px; }

.dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.col-pendiente  .dot, .col-pendiente  .col-title { --c: var(--amber); }
.col-proceso    .dot, .col-proceso    .col-title { --c: var(--blue); }
.col-finalizada .dot, .col-finalizada .col-title { --c: var(--green); }
.dot { background: var(--c, var(--muted)); }
.col-title { color: var(--c, var(--text)); }

.badge { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700;
  padding: 2px 7px; border-radius: 20px; min-width: 22px; text-align: center;
  background: color-mix(in srgb, var(--c, var(--muted)) 15%, transparent);
  color: var(--c, var(--muted)); }

.task-list { padding: 10px 8px; display: flex; flex-direction: column; gap: 7px; min-height: 70px; }

/* ── TASK CARD ── */
.task {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 10px; padding: 11px 12px 9px;
  cursor: grab; transition: border-color .15s, transform .12s, box-shadow .15s, opacity .15s;
  animation: fadeIn .22s ease;
  display: flex; flex-direction: column; gap: 8px;
}
.task:hover { border-color: var(--border2); box-shadow: 0 4px 18px rgba(0,0,0,.45); }
.task.dragging { opacity: .3; cursor: grabbing; }

.task-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
.task-text { font-size: 13px; line-height: 1.45; color: var(--text); flex: 1; word-break: break-word; }
.btn-delete { background: none; border: none; cursor: pointer; color: var(--muted);
  padding: 2px 3px; border-radius: 5px; font-size: 12px; line-height: 1; flex-shrink: 0;
  transition: color .15s, background .15s; }
.btn-delete:hover { color: var(--red); background: rgba(255,95,95,.1); }

/* ── ASSIGNEES ROW ── */
.task-footer { display: flex; align-items: center; justify-content: space-between; gap: 6px; }
.assignees { display: flex; align-items: center; gap: -4px; position: relative; }
.avatar {
  width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--bg);
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 700; font-family: 'Syne', sans-serif;
  margin-left: -4px; cursor: default; flex-shrink: 0; position: relative;
  transition: transform .15s;
  color: #000;
}
.avatar:first-child { margin-left: 0; }
.avatar:hover { transform: translateY(-2px); z-index: 1; }
.avatar-more {
  width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--bg);
  background: var(--border2); color: var(--text2); font-size: 9px; font-weight: 700;
  font-family: 'Syne', sans-serif; display: flex; align-items: center; justify-content: center;
  margin-left: -4px; flex-shrink: 0;
}

.btn-assign {
  background: none; border: 1px dashed var(--border2); color: var(--muted);
  border-radius: 20px; padding: 2px 8px; font-size: 11px; cursor: pointer;
  transition: border-color .15s, color .15s; white-space: nowrap; font-family: 'DM Sans', sans-serif;
}
.btn-assign:hover { border-color: var(--amber); color: var(--amber); }

/* ── GHOST ── */
.ghost { border: 2px dashed var(--amber); border-radius: 10px; min-height: 50px;
  background: rgba(240,165,0,.04); animation: pulse .9s ease infinite alternate; }

/* ── EMPTY ── */
.empty { color: var(--muted); font-size: 12px; text-align: center;
  padding: 10px 0 4px; pointer-events: none; user-select: none; }

/* ─────────────────────────────────────────── */
/* ── MODAL BASE ── */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.65); z-index: 100;
  display: flex; align-items: center; justify-content: center; padding: 16px;
  opacity: 0; pointer-events: none; transition: opacity .2s;
}
.overlay.open { opacity: 1; pointer-events: all; }

.modal {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 18px; width: 100%; max-width: 420px;
  box-shadow: 0 24px 64px rgba(0,0,0,.7);
  transform: translateY(14px) scale(.98); transition: transform .22s ease;
  overflow: hidden;
}
.overlay.open .modal { transform: translateY(0) scale(1); }

.modal-header {
  padding: 18px 20px 14px; display: flex; align-items: center;
  justify-content: space-between; border-bottom: 1px solid var(--border);
}
.modal-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 16px; }
.modal-close { background: none; border: none; cursor: pointer; color: var(--muted);
  font-size: 18px; line-height: 1; padding: 4px; border-radius: 6px;
  transition: color .15s, background .15s; }
.modal-close:hover { color: var(--text); background: var(--border); }
.modal-body { padding: 18px 20px; display: flex; flex-direction: column; gap: 14px;
  max-height: 60vh; overflow-y: auto; }
.modal-footer { padding: 12px 20px 18px; display: flex; gap: 8px; justify-content: flex-end;
  border-top: 1px solid var(--border); }

/* ── USERS MODAL ── */
.users-grid { display: flex; flex-direction: column; gap: 8px; }

.user-row {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 11px; border-radius: var(--radius-sm);
  background: var(--surface2); border: 1px solid var(--border);
  transition: border-color .15s;
}
.user-row:hover { border-color: var(--border2); }
.user-avatar-big { width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px; color: #000; }
.user-name { flex: 1; font-size: 14px; font-weight: 500; }
.user-tag { font-size: 11px; color: var(--muted); }

.new-user-row { display: flex; gap: 8px; }
.new-user-row input {
  flex: 1; background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); padding: 8px 12px; border-radius: var(--radius-sm);
  font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none;
  transition: border-color .2s; min-width: 0;
}
.new-user-row input::placeholder { color: var(--muted); }
.new-user-row input:focus { border-color: var(--amber); }

/* ── ASSIGN MODAL ── */
.assign-title { font-size: 13px; color: var(--text2); }
.assign-title strong { color: var(--text); font-weight: 500; }

.users-list-assign { display: flex; flex-direction: column; gap: 6px; }

.user-assign-row {
  display: flex; align-items: center; gap: 10px; padding: 8px 11px;
  border-radius: var(--radius-sm); cursor: pointer; transition: background .15s;
  border: 1px solid transparent; user-select: none;
}
.user-assign-row:hover { background: var(--surface2); }
.user-assign-row.selected { background: var(--amber-dim); border-color: rgba(240,165,0,.3); }
.user-assign-row.selected .check { color: var(--amber); }
.check { width: 18px; height: 18px; border-radius: 4px; border: 1.5px solid var(--border2);
  display: flex; align-items: center; justify-content: center; font-size: 11px;
  flex-shrink: 0; transition: border-color .15s, background .15s; }
.user-assign-row.selected .check { background: var(--amber); border-color: var(--amber); color: #000; }

.no-users-msg { color: var(--muted); font-size: 13px; text-align: center; padding: 12px 0; }

/* ── TOAST ── */
.toast { position: fixed; bottom: 20px; right: 20px; background: var(--surface2);
  border: 1px solid var(--border2); color: var(--text); padding: 9px 16px;
  border-radius: 10px; font-size: 13px; box-shadow: 0 8px 32px rgba(0,0,0,.5);
  animation: slideUp .22s ease; z-index: 9999; pointer-events: none; }

/* ── ANIMATIONS ── */
@keyframes fadeIn  { from { opacity:0; transform:translateY(-5px); } to { opacity:1; transform:none; } }
@keyframes slideUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }
@keyframes pulse   { from { opacity:.5; } to { opacity:1; } }

/* ── RESPONSIVE ── */
@media (max-width: 520px) {
  .app { padding: 14px 10px 28px; }
  .logo { font-size: 17px; }
}
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <header>
    <div class="logo">Tareas<span>.</span></div>
    <div class="header-actions">
      <button class="btn btn-ghost" onclick="openUsersModal()">
        <span id="users-count-label">👤 Usuarios (0)</span>
      </button>
    </div>
  </header>

  <!-- ADD BAR -->
  <div class="add-bar">
    <input type="text" id="taskInput" placeholder="Nueva tarea…" maxlength="200" autocomplete="off">
    <select id="colSelect">
      <option value="pendiente">Pendiente</option>
      <option value="proceso">En Proceso</option>
      <option value="finalizada">Finalizada</option>
    </select>
    <button class="btn btn-primary" onclick="addTask()">+ Añadir</button>
  </div>

  <!-- BOARD -->
  <div class="board" id="board">
    <div class="column col-pendiente" id="col-pendiente"
         ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event,'pendiente')">
      <div class="col-header">
        <span class="col-title"><span class="dot"></span>Pendiente</span>
        <span class="badge" id="badge-pendiente">0</span>
      </div>
      <div class="task-list" id="list-pendiente"></div>
    </div>

    <div class="column col-proceso" id="col-proceso"
         ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event,'proceso')">
      <div class="col-header">
        <span class="col-title"><span class="dot"></span>En Proceso</span>
        <span class="badge" id="badge-proceso">0</span>
      </div>
      <div class="task-list" id="list-proceso"></div>
    </div>

    <div class="column col-finalizada" id="col-finalizada"
         ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event,'finalizada')">
      <div class="col-header">
        <span class="col-title"><span class="dot"></span>Finalizada</span>
        <span class="badge" id="badge-finalizada">0</span>
      </div>
      <div class="task-list" id="list-finalizada"></div>
    </div>
  </div>

</div>

<!-- ══════════════════════════════ -->
<!-- MODAL: GESTIONAR USUARIOS      -->
<!-- ══════════════════════════════ -->
<div class="overlay" id="overlay-users" onclick="closeOnBg(event,'overlay-users')">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Gestionar usuarios</span>
      <button class="modal-close" onclick="closeModal('overlay-users')">✕</button>
    </div>
    <div class="modal-body">
      <!-- New user input -->
      <div class="new-user-row">
        <input type="text" id="newUserInput" placeholder="Nombre del usuario…" maxlength="30"
               onkeydown="if(event.key==='Enter') createUser()">
        <button class="btn btn-primary btn-sm" onclick="createUser()">Crear</button>
      </div>
      <!-- Existing users -->
      <div class="users-grid" id="users-grid"></div>
    </div>
  </div>
</div>

<!-- ══════════════════════════════ -->
<!-- MODAL: ASIGNAR USUARIOS        -->
<!-- ══════════════════════════════ -->
<div class="overlay" id="overlay-assign" onclick="closeOnBg(event,'overlay-assign')">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Asignar personas</span>
      <button class="modal-close" onclick="closeModal('overlay-assign')">✕</button>
    </div>
    <div class="modal-body">
      <p class="assign-title" id="assign-subtitle"></p>
      <div class="users-list-assign" id="users-list-assign"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-primary btn-sm" onclick="saveAssignment()">Guardar</button>
    </div>
  </div>
</div>

<script>
/* ══════════════════════════════════════════════════════
   STATE
══════════════════════════════════════════════════════ */
const TASKS_KEY = 'kanban_tasks_v2';
const USERS_KEY = 'kanban_users_v1';

let tasks = [];
let users = [];

/* 12 distinct palette colors */
const COLORS = [
  '#f0a500','#5b9bff','#3ecf6a','#ff7043','#ab7df8',
  '#00c9c9','#ff5c8a','#a3e635','#f97316','#38bdf8',
  '#e879f9','#facc15'
];

/* ══════════════════════════════════════════════════════
   STORAGE — localStorage con fallback a cookies
   (Google Sites bloquea localStorage en iframes;
    las cookies funcionan en ambos contextos)
══════════════════════════════════════════════════════ */

/* — Detectar si localStorage está disponible — */
function lsAvailable() {
  try {
    const k = '__kanban_test__';
    localStorage.setItem(k, '1');
    const ok = localStorage.getItem(k) === '1';
    localStorage.removeItem(k);
    return ok;
  } catch(e) { return false; }
}
const USE_LS = lsAvailable();

/* — Helpers de cookies (con chunking para datos grandes) — */
const COOKIE_OPTS = '; max-age=31536000; path=/; SameSite=None; Secure';
const CHUNK_SIZE  = 2800; // bytes seguros por cookie

function cookieSet(key, value) {
  const str = encodeURIComponent(value);
  const total = Math.ceil(str.length / CHUNK_SIZE) || 1;
  // Limpiar chunks anteriores
  for (let i = 0; i < 30; i++) {
    if (getCookieRaw(key + '_' + i) === null) break;
    document.cookie = key + '_' + i + '=; max-age=0; path=/';
  }
  document.cookie = key + '_n=' + total + COOKIE_OPTS;
  for (let i = 0; i < total; i++) {
    document.cookie = key + '_' + i + '=' +
      str.slice(i * CHUNK_SIZE, (i + 1) * CHUNK_SIZE) + COOKIE_OPTS;
  }
}

function cookieGet(key) {
  const n = parseInt(getCookieRaw(key + '_n') || '0');
  if (!n) return null;
  let str = '';
  for (let i = 0; i < n; i++) {
    const chunk = getCookieRaw(key + '_' + i);
    if (chunk === null) return null;
    str += chunk;
  }
  try { return decodeURIComponent(str); } catch(e) { return null; }
}

function getCookieRaw(name) {
  const match = document.cookie.split('; ').find(r => r.startsWith(name + '='));
  return match ? match.slice(name.length + 1) : null;
}

/* — API pública de almacenamiento — */
function storeSet(key, value) {
  const str = JSON.stringify(value);
  if (USE_LS) {
    try { localStorage.setItem(key, str); return; } catch(e) {}
  }
  try { cookieSet(key, str); } catch(e) {}
}

function storeGet(key) {
  if (USE_LS) {
    try {
      const v = localStorage.getItem(key);
      if (v !== null) return JSON.parse(v);
    } catch(e) {}
  }
  try {
    const v = cookieGet(key);
    if (v !== null) return JSON.parse(v);
  } catch(e) {}
  return null;
}

/* — Indicador visual del método de almacenamiento — */
function showStorageBadge() {
  const badge = document.createElement('div');
  badge.style.cssText =
    'position:fixed;bottom:8px;left:10px;font-size:10px;color:var(--muted);' +
    'font-family:DM Sans,sans-serif;opacity:.55;pointer-events:none;z-index:9999;';
  badge.textContent = USE_LS ? '💾 localStorage' : '🍪 cookies';
  document.body.appendChild(badge);
}

/* — save / load — */
function save() {
  storeSet(TASKS_KEY, tasks);
  storeSet(USERS_KEY, users);
}
function load() {
  tasks = storeGet(TASKS_KEY) || [];
  users = storeGet(USERS_KEY) || [];
  tasks.forEach(t => { if (!t.users) t.users = []; });
}

/* ══════════════════════════════════════════════════════
   USERS
══════════════════════════════════════════════════════ */
function createUser() {
  const input = document.getElementById('newUserInput');
  const name  = input.value.trim();
  if (!name) { input.focus(); return; }
  const color = COLORS[users.length % COLORS.length];
  users.push({ id: uid(), name, color });
  save();
  input.value = '';
  renderUsersModal();
  updateUsersCountLabel();
  render(); // refresh avatars
  toast(`Usuario "${name}" creado`);
}

function deleteUser(id) {
  const u = users.find(u => u.id === id);
  users = users.filter(u => u.id !== id);
  // remove from all tasks
  tasks.forEach(t => { t.users = (t.users || []).filter(uid => uid !== id); });
  save();
  renderUsersModal();
  updateUsersCountLabel();
  render();
  if (u) toast(`Usuario "${u.name}" eliminado`);
}

function renderUsersModal() {
  const grid = document.getElementById('users-grid');
  grid.innerHTML = '';
  if (users.length === 0) {
    grid.innerHTML = '<div style="color:var(--muted);font-size:13px;text-align:center;padding:8px 0">Aún no hay usuarios. ¡Crea el primero!</div>';
    return;
  }
  users.forEach(u => {
    const row = document.createElement('div');
    row.className = 'user-row';
    row.innerHTML = `
      <div class="user-avatar-big" style="background:${u.color}">${initials(u.name)}</div>
      <div style="flex:1">
        <div class="user-name">${esc(u.name)}</div>
      </div>
      <button class="btn btn-danger btn-sm" onclick="deleteUser('${u.id}')">Eliminar</button>`;
    grid.appendChild(row);
  });
}

function updateUsersCountLabel() {
  document.getElementById('users-count-label').textContent = `👤 Usuarios (${users.length})`;
}

/* ══════════════════════════════════════════════════════
   ASSIGN
══════════════════════════════════════════════════════ */
let assigningTaskId = null;
let assignTemp = [];   // temp selection

function openAssignModal(taskId) {
  const task = tasks.find(t => t.id === taskId);
  if (!task) return;
  assigningTaskId = taskId;
  assignTemp = [...(task.users || [])];

  document.getElementById('assign-subtitle').innerHTML =
    `Asignando a: <strong>${esc(task.text)}</strong>`;

  const list = document.getElementById('users-list-assign');
  list.innerHTML = '';

  if (users.length === 0) {
    list.innerHTML = '<div class="no-users-msg">Primero crea usuarios desde el botón <strong>Usuarios</strong>.</div>';
  } else {
    users.forEach(u => {
      const row = document.createElement('div');
      row.className = 'user-assign-row' + (assignTemp.includes(u.id) ? ' selected' : '');
      row.dataset.uid = u.id;
      row.innerHTML = `
        <div class="check">${assignTemp.includes(u.id) ? '✓' : ''}</div>
        <div class="user-avatar-big" style="background:${u.color};width:28px;height:28px;font-size:11px">${initials(u.name)}</div>
        <span style="font-size:14px">${esc(u.name)}</span>`;
      row.addEventListener('click', () => toggleAssignRow(row, u.id));
      list.appendChild(row);
    });
  }

  openModal('overlay-assign');
}

function toggleAssignRow(row, uid) {
  if (assignTemp.includes(uid)) {
    assignTemp = assignTemp.filter(id => id !== uid);
    row.classList.remove('selected');
    row.querySelector('.check').textContent = '';
  } else {
    assignTemp.push(uid);
    row.classList.add('selected');
    row.querySelector('.check').textContent = '✓';
  }
}

function saveAssignment() {
  const task = tasks.find(t => t.id === assigningTaskId);
  if (task) {
    task.users = [...assignTemp];
    save();
    render();
    toast('Asignación guardada ✓');
  }
  closeModal('overlay-assign');
}

/* ══════════════════════════════════════════════════════
   TASKS
══════════════════════════════════════════════════════ */
function addTask() {
  const input = document.getElementById('taskInput');
  const col   = document.getElementById('colSelect').value;
  const text  = input.value.trim();
  if (!text) { input.focus(); return; }
  tasks.push({ id: uid(), text, col, users: [] });
  save(); render();
  input.value = '';
  input.focus();
  toast('Tarea añadida ✓');
}

function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  save(); render();
  toast('Tarea eliminada');
}

/* ══════════════════════════════════════════════════════
   RENDER
══════════════════════════════════════════════════════ */
function render() {
  ['pendiente','proceso','finalizada'].forEach(col => {
    const list  = document.getElementById('list-' + col);
    const badge = document.getElementById('badge-' + col);
    const colTasks = tasks.filter(t => t.col === col);
    badge.textContent = colTasks.length;

    // remove deleted cards
    [...list.querySelectorAll('.task')].forEach(el => {
      if (!colTasks.find(t => t.id === el.dataset.id)) el.remove();
    });

    // add new / update existing
    colTasks.forEach(task => {
      let el = list.querySelector(`.task[data-id="${task.id}"]`);
      if (!el) {
        el = buildTaskEl(task);
        list.appendChild(el);
      } else {
        updateTaskEl(el, task);
      }
    });

    // reorder
    colTasks.forEach(task => list.appendChild(list.querySelector(`.task[data-id="${task.id}"]`)));

    // empty state
    let empty = list.querySelector('.empty');
    if (colTasks.length === 0) {
      if (!empty) { empty = document.createElement('div'); empty.className='empty'; empty.textContent='Sin tareas'; list.appendChild(empty); }
    } else { if (empty) empty.remove(); }
  });
}

function buildTaskEl(task) {
  const el = document.createElement('div');
  el.className = 'task';
  el.dataset.id = task.id;
  el.draggable = true;
  el.addEventListener('dragstart', e => onDragStart(e, task.id));
  el.addEventListener('dragend', onDragEnd);
  updateTaskEl(el, task);
  return el;
}

function updateTaskEl(el, task) {
  el.innerHTML = `
    <div class="task-top">
      <span class="task-text">${esc(task.text)}</span>
      <button class="btn-delete" title="Eliminar" onclick="deleteTask('${task.id}')">✕</button>
    </div>
    <div class="task-footer">
      <div class="assignees">${renderAvatars(task)}</div>
      <button class="btn-assign" onclick="openAssignModal('${task.id}')">
        ${(task.users||[]).length > 0 ? '✎ editar' : '+ asignar'}
      </button>
    </div>`;
}

function renderAvatars(task) {
  const ids = task.users || [];
  if (ids.length === 0) return '';
  const show = ids.slice(0, 3);
  const rest  = ids.length - show.length;
  let html = show.map(uid => {
    const u = users.find(u => u.id === uid);
    if (!u) return '';
    return `<div class="avatar" style="background:${u.color}" title="${esc(u.name)}">${initials(u.name)}</div>`;
  }).join('');
  if (rest > 0) html += `<div class="avatar-more">+${rest}</div>`;
  return html;
}

/* ══════════════════════════════════════════════════════
   DRAG & DROP
══════════════════════════════════════════════════════ */
let dragId = null, ghost = null;

function onDragStart(e, id) {
  dragId = id;
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(() => document.querySelector(`.task[data-id="${id}"]`)?.classList.add('dragging'), 0);
}

function onDragEnd() {
  document.querySelectorAll('.task.dragging').forEach(el => el.classList.remove('dragging'));
  document.querySelectorAll('.column.drag-over').forEach(el => el.classList.remove('drag-over'));
  if (ghost) { ghost.remove(); ghost = null; }
  dragId = null;
}

function onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const col = e.currentTarget;
  col.classList.add('drag-over');
  if (!ghost) { ghost = document.createElement('div'); ghost.className = 'ghost'; }
  const list = col.querySelector('.task-list');
  const after = getDragAfter(list, e.clientY);
  after ? list.insertBefore(ghost, after) : list.appendChild(ghost);
}

function onDragLeave(e) {
  const col = e.currentTarget;
  if (!col.contains(e.relatedTarget)) {
    col.classList.remove('drag-over');
    if (ghost) { ghost.remove(); ghost = null; }
  }
}

function onDrop(e, colId) {
  e.preventDefault();
  if (!dragId) return;
  e.currentTarget.classList.remove('drag-over');
  if (ghost) { ghost.remove(); ghost = null; }

  const task = tasks.find(t => t.id === dragId);
  if (!task) return;
  const oldCol = task.col;
  task.col = colId;

  const list = document.getElementById('list-' + colId);
  const after = getDragAfter(list, e.clientY);
  const afterId = after?.dataset.id;

  tasks = tasks.filter(t => t.id !== dragId);
  if (afterId) {
    const idx = tasks.findIndex(t => t.id === afterId);
    tasks.splice(idx, 0, task);
  } else {
    const colTasks = tasks.filter(t => t.col === colId);
    const lastIdx  = colTasks.length > 0
      ? tasks.indexOf(colTasks[colTasks.length - 1]) + 1
      : tasks.length;
    tasks.splice(lastIdx, 0, task);
  }
  save(); render();
  if (oldCol !== colId) toast('Tarea movida ✓');
}

function getDragAfter(list, y) {
  return [...list.querySelectorAll('.task:not(.dragging)')].reduce((closest, child) => {
    const { top, height } = child.getBoundingClientRect();
    const offset = y - top - height / 2;
    return offset < 0 && offset > closest.offset ? { offset, element: child } : closest;
  }, { offset: Number.NEGATIVE_INFINITY }).element;
}

/* ══════════════════════════════════════════════════════
   MODAL HELPERS
══════════════════════════════════════════════════════ */
function openModal(id) {
  document.getElementById(id).classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  document.body.style.overflow = '';
}
function closeOnBg(e, id) {
  if (e.target === document.getElementById(id)) closeModal(id);
}
function openUsersModal() {
  renderUsersModal();
  openModal('overlay-users');
  setTimeout(() => document.getElementById('newUserInput').focus(), 250);
}

/* ══════════════════════════════════════════════════════
   UTILS
══════════════════════════════════════════════════════ */
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function initials(name) {
  return name.trim().split(/\s+/).slice(0,2).map(w=>w[0].toUpperCase()).join('');
}

let toastTimer;
function toast(msg) {
  document.querySelectorAll('.toast').forEach(el=>el.remove());
  clearTimeout(toastTimer);
  const el = document.createElement('div');
  el.className = 'toast'; el.textContent = msg;
  document.body.appendChild(el);
  toastTimer = setTimeout(() => el.remove(), 2400);
}

/* ══════════════════════════════════════════════════════
   ENTER KEY
══════════════════════════════════════════════════════ */
document.getElementById('taskInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addTask();
});

/* ══════════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════════ */
load();
showStorageBadge();
updateUsersCountLabel();
render();
</script>
