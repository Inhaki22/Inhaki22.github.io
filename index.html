<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablero de Tareas</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0d0d0d; --surface: #161616; --surface2: #1e1e1e;
            --border: #272727; --border2: #333; --text: #ede8e0;
            --text2: #a09a93; --muted: #5c5650; --amber: #f0a500;
            --amber-dim: #2e2000; --blue: #5b9bff; --blue-dim: #0b1d40;
            --green: #3ecf6a; --green-dim: #0a2818; --red: #ff5f5f;
            --radius: 12px; --radius-sm: 8px;
        }
        html, body {
            height: 100%; background: var(--bg); color: var(--text);
            font-family: 'DM Sans', sans-serif; font-size: 14px;
        }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 10px; }
        .app { min-height: 100vh; display: flex; flex-direction: column; gap: 20px; padding: 24px 18px 40px; }
        header { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
        .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px; letter-spacing: -0.4px; }
        .logo span { color: var(--amber); }
        .header-actions { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn {
            display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px;
            border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif;
            font-size: 13px; font-weight: 500; cursor: pointer; border: none;
            transition: opacity .15s, transform .1s, background .15s; white-space: nowrap;
        }
        .btn:hover { opacity: .82; }
        .btn:active { transform: scale(.97); }
        .btn-primary { background: var(--amber); color: #000; font-family: 'Syne', sans-serif; font-weight: 700; }
        .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border2); }
        .btn-danger { background: transparent; color: var(--red); border: 1px solid rgba(255,95,95,.3); }
        .btn-danger:hover { background: rgba(255,95,95,.08); opacity: 1; }
        .btn-sm { padding: 5px 10px; font-size: 12px; }
        .add-bar { display: flex; gap: 8px; flex-wrap: wrap; }
        .add-bar input, .add-bar select {
            background: var(--surface); border: 1px solid var(--border); color: var(--text);
            padding: 8px 13px; border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif;
            font-size: 14px; outline: none; transition: border-color .2s;
        }
        .add-bar input { flex: 1 1 160px; min-width: 0; }
        .add-bar input::placeholder { color: var(--muted); }
        .add-bar input:focus, .add-bar select:focus { border-color: var(--amber); }
        .add-bar select { cursor: pointer; }
        .board { display: flex; gap: 14px; align-items: flex-start; flex-wrap: wrap; flex: 1; }
        .column {
            flex: 1 1 280px; min-width: 230px; background: var(--surface);
            border: 1px solid var(--border); border-radius: 16px; display: flex;
            flex-direction: column; overflow: hidden; transition: border-color .2s, box-shadow .2s;
        }
        .column.drag-over { border-color: var(--amber); box-shadow: 0 0 0 1px var(--amber), inset 0 0 40px rgba(240,165,0,.03); }
        .col-header { padding: 14px 16px 11px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
        .col-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 12px; letter-spacing: .7px; text-transform: uppercase; display: flex; align-items: center; gap: 7px; }
        .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
        .col-pendiente .dot, .col-pendiente .col-title { --c: var(--amber); }
        .col-proceso .dot, .col-proceso .col-title { --c: var(--blue); }
        .col-finalizada .dot, .col-finalizada .col-title { --c: var(--green); }
        .dot { background: var(--c, var(--muted)); }
        .col-title { color: var(--c, var(--text)); }
        .badge {
            font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700;
            padding: 2px 7px; border-radius: 20px; min-width: 22px; text-align: center;
            background: color-mix(in srgb, var(--c, var(--muted)) 15%, transparent);
            color: var(--c, var(--muted));
        }
        .task-list { padding: 10px 8px; display: flex; flex-direction: column; gap: 7px; min-height: 70px; }
        .task {
            background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
            padding: 11px 12px 9px; cursor: grab; transition: border-color .15s, transform .12s, box-shadow .15s, opacity .15s;
            animation: fadeIn .22s ease; display: flex; flex-direction: column; gap: 8px;
        }
        .task:hover { border-color: var(--border2); box-shadow: 0 4px 18px rgba(0,0,0,.45); }
        .task.dragging { opacity: .3; cursor: grabbing; }
        .task-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
        .task-text { font-size: 13px; line-height: 1.45; color: var(--text); flex: 1; word-break: break-word; }
        .btn-delete {
            background: none; border: none; cursor: pointer; color: var(--muted);
            padding: 2px 3px; border-radius: 5px; font-size: 12px; line-height: 1;
            flex-shrink: 0; transition: color .15s, background .15s;
        }
        .btn-delete:hover { color: var(--red); background: rgba(255,95,95,.1); }
        .task-footer { display: flex; align-items: center; justify-content: space-between; gap: 6px; }
        .assignees { display: flex; align-items: center; }
        .avatar {
            width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--bg);
            display: flex; align-items: center; justify-content: center; font-size: 9px;
            font-weight: 700; font-family: 'Syne', sans-serif; margin-left: -4px;
            cursor: default; flex-shrink: 0; position: relative; transition: transform .15s; color: #000;
        }
        .avatar:first-child { margin-left: 0; }
        .avatar:hover { transform: translateY(-2px); z-index: 1; }
        .avatar-more {
            width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--bg);
            background: var(--border2); color: var(--text2); font-size: 9px;
            font-weight: 700; font-family: 'Syne', sans-serif; display: flex;
            align-items: center; justify-content: center; margin-left: -4px; flex-shrink: 0;
        }
        .btn-assign {
            background: none; border: 1px dashed var(--border2); color: var(--muted);
            border-radius: 20px; padding: 2px 8px; font-size: 11px; cursor: pointer;
            transition: border-color .15s, color .15s; white-space: nowrap; font-family: 'DM Sans', sans-serif;
        }
        .btn-assign:hover { border-color: var(--amber); color: var(--amber); }
        .ghost { border: 2px dashed var(--amber); border-radius: 10px; min-height: 50px; background: rgba(240,165,0,.04); animation: pulse .9s ease infinite alternate; }
        .empty { color: var(--muted); font-size: 12px; text-align: center; padding: 10px 0 4px; pointer-events: none; user-select: none; }
        .overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,.65); z-index: 100;
            display: flex; align-items: center; justify-content: center; padding: 16px;
            opacity: 0; pointer-events: none; transition: opacity .2s;
        }
        .overlay.open { opacity: 1; pointer-events: all; }
        .modal {
            background: var(--surface); border: 1px solid var(--border2); border-radius: 18px;
            width: 100%; max-width: 420px; box-shadow: 0 24px 64px rgba(0,0,0,.7);
            transform: translateY(14px) scale(.98); transition: transform .22s ease; overflow: hidden;
        }
        .overlay.open .modal { transform: translateY(0) scale(1); }
        .modal-header { padding: 18px 20px 14px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
        .modal-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 16px; }
        .modal-close { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 18px; line-height: 1; padding: 4px; border-radius: 6px; transition: color .15s, background .15s; }
        .modal-close:hover { color: var(--text); background: var(--border); }
        .modal-body { padding: 18px 20px; display: flex; flex-direction: column; gap: 14px; max-height: 60vh; overflow-y: auto; }
        .modal-footer { padding: 12px 20px 18px; display: flex; gap: 8px; justify-content: flex-end; border-top: 1px solid var(--border); }
        .users-grid { display: flex; flex-direction: column; gap: 8px; }
        .user-row { display: flex; align-items: center; gap: 10px; padding: 9px 11px; border-radius: var(--radius-sm); background: var(--surface2); border: 1px solid var(--border); transition: border-color .15s; }
        .user-row:hover { border-color: var(--border2); }
        .user-avatar-big { width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px; color: #000; }
        .user-name { flex: 1; font-size: 14px; font-weight: 500; }
        .new-user-row { display: flex; gap: 8px; }
        .new-user-row input { flex: 1; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; transition: border-color .2s; min-width: 0; }
        .new-user-row input::placeholder { color: var(--muted); }
        .new-user-row input:focus { border-color: var(--amber); }
        .assign-title { font-size: 13px; color: var(--text2); }
        .assign-title strong { color: var(--text); font-weight: 500; }
        .users-list-assign { display: flex; flex-direction: column; gap: 6px; }
        .user-assign-row { display: flex; align-items: center; gap: 10px; padding: 8px 11px; border-radius: var(--radius-sm); cursor: pointer; transition: background .15s; border: 1px solid transparent; user-select: none; }
        .user-assign-row:hover { background: var(--surface2); }
        .user-assign-row.selected { background: var(--amber-dim); border-color: rgba(240,165,0,.3); }
        .check { width: 18px; height: 18px; border-radius: 4px; border: 1.5px solid var(--border2); display: flex; align-items: center; justify-content: center; font-size: 11px; flex-shrink: 0; }
        .user-assign-row.selected .check { background: var(--amber); border-color: var(--amber); color: #000; }
        .no-users-msg { color: var(--muted); font-size: 13px; text-align: center; padding: 12px 0; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: var(--surface2); border: 1px solid var(--border2); color: var(--text); padding: 9px 16px; border-radius: 10px; font-size: 13px; box-shadow: 0 8px 32px rgba(0,0,0,.5); animation: slideUp .22s ease; z-index: 9999; pointer-events: none; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(-5px); } to { opacity:1; transform:none; } }
        @keyframes slideUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }
        @keyframes pulse { from { opacity:.5; } to { opacity:1; } }
        @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-8px)} 40%,80%{transform:translateX(8px)} }
        
        /* PASSWORD SCREEN */
        .lock-screen { position: fixed; inset: 0; background: var(--bg); z-index: 999; display: flex; align-items: center; justify-content: center; padding: 24px; }
        .lock-screen.hidden { display: none; }
        .lock-box { background: var(--surface); border: 1px solid var(--border2); border-radius: 20px; padding: 40px 36px 36px; width: 100%; max-width: 360px; display: flex; flex-direction: column; align-items: center; gap: 24px; box-shadow: 0 32px 80px rgba(0,0,0,.6); }
        .lock-icon { width: 52px; height: 52px; border-radius: 14px; background: var(--amber-dim); border: 1px solid rgba(240,165,0,.2); display: flex; align-items: center; justify-content: center; font-size: 22px; }
        .lock-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 22px; letter-spacing: -.4px; text-align: center; }
        .lock-title span { color: var(--amber); }
        .lock-subtitle { font-size: 13px; color: var(--muted); text-align: center; margin-top: -16px; }
        .lock-field { width: 100%; }
        .lock-field input { width: 100%; background: var(--surface2); border: 1px solid var(--border2); color: var(--text); padding: 11px 14px; border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 15px; outline: none; transition: border-color .2s; text-align: center; letter-spacing: 2px; }
        .lock-field input::placeholder { letter-spacing: 0; color: var(--muted); }
        .lock-field input:focus { border-color: var(--amber); }
        .lock-field input.error { border-color: var(--red); animation: shake .35s ease; }
        .lock-error { font-size: 12px; color: var(--red); text-align: center; min-height: 16px; margin-top: 6px; }
        .lock-btn { width: 100%; padding: 12px; background: var(--amber); color: #000; border: none; border-radius: var(--radius-sm); font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; cursor: pointer; transition: opacity .15s, transform .1s; }
        .lock-btn:hover { opacity: .85; }
        .lock-btn:active { transform: scale(.98); }
    </style>
</head>
<body>

    <div class="lock-screen" id="lock-screen">
        <div class="lock-box">
            <div class="lock-icon">🔒</div>
            <div class="lock-title">Project<span>Dimension</span></div>
            <div class="lock-subtitle">Introduce la contraseña para continuar</div>
            <div class="lock-field">
                <input type="password" id="lockInput" placeholder="Contraseña…" onkeydown="if(event.key==='Enter') window.checkPassword()">
                <div class="lock-error" id="lock-error"></div>
            </div>
            <button class="lock-btn" onclick="window.checkPassword()">Entrar →</button>
        </div>
    </div>

    <div class="app">
        <header>
            <div class="logo">Tareas<span>.</span></div>
            <div class="header-actions">
                <button class="btn btn-ghost" onclick="window.openUsersModal()">
                    <span id="users-count-label">👤 Usuarios (0)</span>
                </button>
            </div>
        </header>

        <div class="add-bar">
            <input type="text" id="taskInput" placeholder="Nueva tarea…" maxlength="200" autocomplete="off">
            <select id="colSelect">
                <option value="pendiente">Pendiente</option>
                <option value="proceso">En Proceso</option>
                <option value="finalizada">Finalizada</option>
            </select>
            <button class="btn btn-primary" onclick="window.addTask()">+ Añadir</button>
        </div>

        <div class="board" id="board">
            <div class="column col-pendiente" id="col-pendiente" ondragover="window.onDragOver(event)" ondragleave="window.onDragLeave(event)" ondrop="window.onDrop(event,'pendiente')">
                <div class="col-header">
                    <span class="col-title"><span class="dot"></span>Pendiente</span>
                    <span class="badge" id="badge-pendiente">0</span>
                </div>
                <div class="task-list" id="list-pendiente"></div>
            </div>

            <div class="column col-proceso" id="col-proceso" ondragover="window.onDragOver(event)" ondragleave="window.onDragLeave(event)" ondrop="window.onDrop(event,'proceso')">
                <div class="col-header">
                    <span class="col-title"><span class="dot"></span>En Proceso</span>
                    <span class="badge" id="badge-proceso">0</span>
                </div>
                <div class="task-list" id="list-proceso"></div>
            </div>

            <div class="column col-finalizada" id="col-finalizada" ondragover="window.onDragOver(event)" ondragleave="window.onDragLeave(event)" ondrop="window.onDrop(event,'finalizada')">
                <div class="col-header">
                    <span class="col-title"><span class="dot"></span>Finalizada</span>
                    <span class="badge" id="badge-finalizada">0</span>
                </div>
                <div class="task-list" id="list-finalizada"></div>
            </div>
        </div>
    </div>

    <div class="overlay" id="overlay-users" onclick="window.closeOnBg(event,'overlay-users')">
        <div class="modal">
            <div class="modal-header">
                <span class="modal-title">Gestionar usuarios</span>
                <button class="modal-close" onclick="window.closeModal('overlay-users')">✕</button>
            </div>
            <div class="modal-body">
                <div class="new-user-row">
                    <input type="text" id="newUserInput" placeholder="Nombre del usuario…" maxlength="30" onkeydown="if(event.key==='Enter') window.createUser()">
                    <button class="btn btn-primary btn-sm" onclick="window.createUser()">Crear</button>
                </div>
                <div class="users-grid" id="users-grid"></div>
            </div>
        </div>
    </div>

    <div class="overlay" id="overlay-assign" onclick="window.closeOnBg(event,'overlay-assign')">
        <div class="modal">
            <div class="modal-header">
                <span class="modal-title">Asignar personas</span>
                <button class="modal-close" onclick="window.closeModal('overlay-assign')">✕</button>
            </div>
            <div class="modal-body">
                <p class="assign-title" id="assign-subtitle"></p>
                <div class="users-list-assign" id="users-list-assign"></div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary btn-sm" onclick="window.saveAssignment()">Guardar</button>
            </div>
        </div>
    </div>

    <script type="module">
        // Importaciones de Firebase v10 usando CDNs
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-analytics.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // Configuración de Firebase que nos pasaste
        const firebaseConfig = {
            apiKey: "AIzaSyADQFZA-18JoHy10L1G9TxDUAKTS7x4Td0",
            authDomain: "dimensionprojecttareas.firebaseapp.com",
            projectId: "dimensionprojecttareas",
            storageBucket: "dimensionprojecttareas.firebasestorage.app",
            messagingSenderId: "827238739887",
            appId: "1:827238739887:web:ff4ea17b22d03290b5495a",
            measurementId: "G-R32YCE13PE"
        };

        // Inicialización
        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const db = getFirestore(app, 'tareasdim');

        // Variables de estado
        let tasks = [], users = [];
        const COLORS = ['#f0a500','#5b9bff','#3ecf6a','#ff7043','#ab7df8', '#00c9c9','#ff5c8a','#a3e635','#f97316','#38bdf8','#e879f9','#facc15'];

        // Función central para guardar en la base de datos de Firestore
        async function save() {
            try {
                // Guardamos todo en una colección llamada "kanban" y un documento "main_board"
                await setDoc(doc(db, "kanban", "main_board"), {
                    tasks: tasks,
                    users: users
                });
            } catch (e) {
                console.error("Error guardando en Firebase:", e);
                toast("Error al guardar en la nube");
            }
        }

        // Función para escuchar cambios en tiempo real
        function load() {
            onSnapshot(doc(db, "kanban", "main_board"), (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    tasks = data.tasks || [];
                    users = data.users || [];
                    
                    tasks.forEach(t => { if (!t.users) t.users = []; });
                    updateUsersCountLabel();
                    renderUsersModal();
                    render();
                } else {
                    // Si el documento no existe (primera vez), lo creamos vacío
                    save();
                }
            }, (error) => {
                console.error("Error obteniendo datos:", error);
            });
        }

        function createUser() {
            const input = document.getElementById('newUserInput');
            const name = input.value.trim();
            if (!name) { input.focus(); return; }

            users.push({ id: uid(), name, color: COLORS[users.length % COLORS.length] });
            save(); // Guarda en Firebase
            input.value = '';
            toast(`Usuario "${name}" creado`);
        }

        function deleteUser(id) {
            const u = users.find(u => u.id === id);
            users = users.filter(u => u.id !== id);
            tasks.forEach(t => {
                t.users = (t.users||[]).filter(x => x !== id);
            });
            save(); // Guarda en Firebase
            if (u) toast(`Usuario "${u.name}" eliminado`);
        }

        function renderUsersModal() {
            const grid = document.getElementById('users-grid');
            grid.innerHTML = '';
            if (!users.length) {
                grid.innerHTML = '<div style="color:var(--muted);font-size:13px;text-align:center;padding:8px 0">Aún no hay usuarios. ¡Crea el primero!</div>';
                return;
            }
            users.forEach(u => {
                const row = document.createElement('div');
                row.className = 'user-row';
                row.innerHTML = `<div class="user-avatar-big" style="background:${u.color}">${initials(u.name)}</div>
                                 <div style="flex:1"><div class="user-name">${esc(u.name)}</div></div>
                                 <button class="btn btn-danger btn-sm" onclick="window.deleteUser('${u.id}')">Eliminar</button>`;
                grid.appendChild(row);
            });
        }

        function updateUsersCountLabel() {
            document.getElementById('users-count-label').textContent = `👤 Usuarios (${users.length})`;
        }

        let assigningTaskId = null, assignTemp = [];

        function openAssignModal(taskId) {
            const task = tasks.find(t => t.id === taskId);
            if (!task) return;
            assigningTaskId = taskId;
            assignTemp = [...(task.users||[])];
            
            document.getElementById('assign-subtitle').innerHTML = `Asignando a: <strong>${esc(task.text)}</strong>`;
            const list = document.getElementById('users-list-assign');
            list.innerHTML = '';
            
            if (!users.length) {
                list.innerHTML = '<div class="no-users-msg">Primero crea usuarios desde el botón <strong>Usuarios</strong>.</div>';
            } else {
                users.forEach(u => {
                    const sel = assignTemp.includes(u.id);
                    const row = document.createElement('div');
                    row.className = 'user-assign-row' + (sel ? ' selected' : '');
                    row.innerHTML = `<div class="check">${sel?'✓':''}</div>
                                     <div class="user-avatar-big" style="background:${u.color};width:28px;height:28px;font-size:11px">${initials(u.name)}</div>
                                     <span style="font-size:14px">${esc(u.name)}</span>`;
                    row.addEventListener('click', () => toggleAssignRow(row, u.id));
                    list.appendChild(row);
                });
            }
            openModal('overlay-assign');
        }

        function toggleAssignRow(row, id) {
            if (assignTemp.includes(id)) {
                assignTemp = assignTemp.filter(x => x !== id);
                row.classList.remove('selected');
                row.querySelector('.check').textContent = '';
            } else {
                assignTemp.push(id);
                row.classList.add('selected');
                row.querySelector('.check').textContent = '✓';
            }
        }

        function saveAssignment() {
            const task = tasks.find(t => t.id === assigningTaskId);
            if (task) {
                task.users = [...assignTemp];
                save(); // Guarda en Firebase
                toast('Asignación guardada ✓');
            }
            closeModal('overlay-assign');
        }

        function addTask() {
            const input = document.getElementById('taskInput');
            const col = document.getElementById('colSelect').value;
            const text = input.value.trim();
            if (!text) { input.focus(); return; }

            tasks.push({ id: uid(), text, col, users: [] });
            save(); // Guarda en Firebase
            input.value = '';
            input.focus();
            toast('Tarea añadida ✓');
        }

        function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            save(); // Guarda en Firebase
            toast('Tarea eliminada');
        }

        function render() {
            ['pendiente','proceso','finalizada'].forEach(col => {
                const list = document.getElementById('list-' + col);
                const badge = document.getElementById('badge-' + col);
                const colTasks = tasks.filter(t => t.col === col);
                
                badge.textContent = colTasks.length;
                
                [...list.querySelectorAll('.task')].forEach(el => {
                    if (!colTasks.find(t => t.id === el.dataset.id)) el.remove();
                });
                
                colTasks.forEach(task => {
                    let el = list.querySelector(`.task[data-id="${task.id}"]`);
                    if (!el) {
                        el = buildTaskEl(task);
                        list.appendChild(el);
                    } else updateTaskEl(el, task);
                });
                
                colTasks.forEach(task => list.appendChild(list.querySelector(`.task[data-id="${task.id}"]`)));
                
                let empty = list.querySelector('.empty');
                if (!colTasks.length) {
                    if (!empty) {
                        empty = document.createElement('div');
                        empty.className='empty';
                        empty.textContent='Sin tareas';
                        list.appendChild(empty);
                    }
                } else {
                    if (empty) empty.remove();
                }
            });
        }

        function buildTaskEl(task) {
            const el = document.createElement('div');
            el.className = 'task';
            el.dataset.id = task.id;
            el.draggable = true;
            el.addEventListener('dragstart', e => onDragStart(e, task.id));
            el.addEventListener('dragend', onDragEnd);
            updateTaskEl(el, task);
            return el;
        }

        function updateTaskEl(el, task) {
            el.innerHTML = `<div class="task-top">
                                <span class="task-text">${esc(task.text)}</span>
                                <button class="btn-delete" onclick="window.deleteTask('${task.id}')">✕</button>
                            </div>
                            <div class="task-footer">
                                <div class="assignees">${renderAvatars(task)}</div>
                                <button class="btn-assign" onclick="window.openAssignModal('${task.id}')">${(task.users||[]).length>0?'✎ editar':'+ asignar'}</button>
                            </div>`;
        }

        function renderAvatars(task) {
            const ids = task.users||[];
            if (!ids.length) return '';
            const show = ids.slice(0,3), rest = ids.length - show.length;
            
            let html = show.map(id => {
                const u = users.find(u => u.id === id);
                return u ? `<div class="avatar" style="background:${u.color}" title="${esc(u.name)}">${initials(u.name)}</div>` : '';
            }).join('');
            
            if (rest > 0) html += `<div class="avatar-more">+${rest}</div>`;
            return html;
        }

        let dragId = null, ghost = null;
        
        function onDragStart(e, id) {
            dragId = id;
            e.dataTransfer.effectAllowed = 'move';
            setTimeout(() => document.querySelector(`.task[data-id="${id}"]`)?.classList.add('dragging'), 0);
        }

        function onDragEnd() {
            document.querySelectorAll('.task.dragging').forEach(el => el.classList.remove('dragging'));
            document.querySelectorAll('.column.drag-over').forEach(el => el.classList.remove('drag-over'));
            if (ghost) { ghost.remove(); ghost = null; }
            dragId = null;
        }

        function onDragOver(e) {
            e.preventDefault();
            const col = e.currentTarget;
            col.classList.add('drag-over');
            if (!ghost) {
                ghost = document.createElement('div');
                ghost.className = 'ghost';
            }
            const list = col.querySelector('.task-list');
            const after = getDragAfter(list, e.clientY);
            after ? list.insertBefore(ghost, after) : list.appendChild(ghost);
        }

        function onDragLeave(e) {
            const col = e.currentTarget;
            if (!col.contains(e.relatedTarget)) {
                col.classList.remove('drag-over');
                if (ghost) { ghost.remove(); ghost = null; }
            }
        }

        function onDrop(e, colId) {
            e.preventDefault();
            if (!dragId) return;
            
            e.currentTarget.classList.remove('drag-over');
            if (ghost) { ghost.remove(); ghost = null; }
            
            const task = tasks.find(t => t.id === dragId);
            if (!task) return;
            
            const oldCol = task.col;
            task.col = colId;
            
            const list = document.getElementById('list-' + colId);
            const after = getDragAfter(list, e.clientY);
            const afterId = after?.dataset.id;
            
            tasks = tasks.filter(t => t.id !== dragId);
            if (afterId) {
                tasks.splice(tasks.findIndex(t => t.id === afterId), 0, task);
            } else {
                const ct = tasks.filter(t => t.col === colId);
                tasks.splice(ct.length > 0 ? tasks.indexOf(ct[ct.length-1])+1 : tasks.length, 0, task);
            }
            
            save(); // Guarda el reordenamiento en Firebase
            if (oldCol !== colId) toast('Tarea movida ✓');
        }

        function getDragAfter(list, y) {
            return [...list.querySelectorAll('.task:not(.dragging)')].reduce((closest, child) => {
                const { top, height } = child.getBoundingClientRect();
                const offset = y - top - height / 2;
                return offset < 0 && offset > closest.offset ? { offset, element: child } : closest;
            }, { offset: Number.NEGATIVE_INFINITY }).element;
        }

        function openModal(id) {
            document.getElementById(id).classList.add('open');
            document.body.style.overflow='hidden';
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('open');
            document.body.style.overflow='';
        }

        function closeOnBg(e, id) {
            if (e.target === document.getElementById(id)) closeModal(id);
        }

        function openUsersModal() {
            renderUsersModal();
            openModal('overlay-users');
            setTimeout(() => document.getElementById('newUserInput').focus(), 250);
        }

        function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
        function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
        function initials(n) { return n.trim().split(/\s+/).slice(0,2).map(w=>w[0].toUpperCase()).join(''); }
        
        let toastTimer;
        function toast(msg) {
            document.querySelectorAll('.toast').forEach(el=>el.remove());
            clearTimeout(toastTimer);
            const el = document.createElement('div');
            el.className = 'toast';
            el.textContent = msg;
            document.body.appendChild(el);
            toastTimer = setTimeout(() => el.remove(), 2400);
        }

        document.getElementById('taskInput').addEventListener('keydown', e => {
            if (e.key==='Enter') addTask();
        });

        /* PASSWORD */
        const PASSWORD = 'projectDimension';
        const SESSION_KEY = 'kanban_auth';
        
        function checkPassword() {
            const input = document.getElementById('lockInput');
            const error = document.getElementById('lock-error');
            
            if (input.value === PASSWORD) {
                sessionStorage.setItem(SESSION_KEY, '1');
                const ls = document.getElementById('lock-screen');
                ls.style.opacity = '0';
                ls.style.transition = 'opacity .3s';
                setTimeout(() => ls.classList.add('hidden'), 300);
                error.textContent = '';
                
                // Si entra exitosamente, carga los datos de Firebase
                load();
            } else {
                input.classList.remove('error');
                void input.offsetWidth;
                input.classList.add('error');
                error.textContent = 'Contraseña incorrecta';
                input.value = '';
                input.focus();
                setTimeout(() => input.classList.remove('error'), 400);
            }
        }

        function initAuth() {
            if (sessionStorage.getItem(SESSION_KEY) === '1') {
                document.getElementById('lock-screen').classList.add('hidden');
                load(); // Cargar la BD automáticamente si ya está autenticado
            } else {
                setTimeout(() => document.getElementById('lockInput').focus(), 100);
            }
        }

        // --- EXPONER FUNCIONES AL ÁMBITO GLOBAL PARA QUE LOS ONCLICK FUNCIONEN ---
        window.checkPassword = checkPassword;
        window.openUsersModal = openUsersModal;
        window.addTask = addTask;
        window.deleteTask = deleteTask;
        window.createUser = createUser;
        window.deleteUser = deleteUser;
        window.openAssignModal = openAssignModal;
        window.saveAssignment = saveAssignment;
        window.closeModal = closeModal;
        window.closeOnBg = closeOnBg;
        window.onDragOver = onDragOver;
        window.onDragLeave = onDragLeave;
        window.onDrop = onDrop;

        // Iniciar
        initAuth();
    </script>
</body>
</html>
